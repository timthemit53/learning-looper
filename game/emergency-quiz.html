<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Procedures — Learning Looper</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --card: #141b2d;
    --text: #e0e0e0;
    --accent: #64ffda;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 60px 20px;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 4px;
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 20px;
  }

  .next-btn {
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .next-btn:hover { background: #52d6b8; }
  .next-btn:disabled { opacity: 0.4; cursor: default; }

  .start-screen {
    max-width: 500px;
    width: 100%;
    text-align: center;
  }

  .unlockables {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin: 10px 0;
  }
  .unlockable-item {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.75rem;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .unlockable-item.locked { background: #1e2740; color: #555; }
  .unlockable-item.unlocked { background: #1a2a1a; color: var(--accent); }

  .lb-entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    margin-bottom: 8px;
    border-radius: 10px;
    cursor: pointer;
    background: var(--card);
    border: 1px solid #2a3450;
    transition: outline 0.2s;
  }
  .lb-entry:hover { outline: 2px solid var(--accent); }

  /* Procedure cards */
  .procedure-card {
    background: var(--card);
    border: 1px solid #2a3450;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 500px;
    text-align: left;
  }
  .procedure-card.locked { opacity: 0.5; }
  .procedure-card[data-category="engine"] { border-left: 3px solid #FF9800; }
  .procedure-card[data-category="fire"] { border-left: 3px solid #F44336; }
  .procedure-card[data-category="spin"] { border-left: 3px solid #9C27B0; }

  .mastery-bar-bg {
    height: 6px;
    background: #1e2740;
    border-radius: 3px;
    flex: 1;
    margin: 0 12px;
    overflow: hidden;
  }
  .mastery-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .mastery-bar-fill.gray { background: #444; }
  .mastery-bar-fill.progress { background: #FF9800; }
  .mastery-bar-fill.mastered { background: #4CAF50; }
  .mastery-bar-fill.perfect { background: #FFD700; }

  .irl-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: #FFD700;
    color: #000;
    font-weight: bold;
  }

  /* Study screen */
  #study-screen {
    max-width: 600px;
    width: 100%;
  }

  #study-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
  }
  #study-procedure-name {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--accent);
    flex: 1;
    text-align: center;
  }
  #study-progress {
    font-size: 0.8rem;
    color: #888;
    white-space: nowrap;
  }

  #step-history {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 12px;
  }
  .history-step {
    padding: 8px 12px;
    background: var(--card);
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 0.85rem;
    color: #666;
    border-left: 3px solid #2a3450;
  }

  #current-step-area {
    background: var(--card);
    border: 1px solid #2a3450;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  #step-prompt {
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .step-action {
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .step-why {
    font-size: 0.85rem;
    color: #aaa;
    margin-top: 12px;
    padding: 10px;
    background: #0d1117;
    border-radius: 8px;
    text-align: left;
    line-height: 1.4;
  }

  .source-btn {
    margin-top: 8px;
    font-size: 0.75rem;
    color: #888;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
  }
  .source-btn:hover { color: var(--accent); }

  .source-info {
    font-size: 0.75rem;
    color: #888;
    margin-top: 6px;
    padding: 8px;
    background: #0d1117;
    border-radius: 6px;
  }
  .source-info a { color: var(--accent); }

  #step-answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .answer-btn {
    background: var(--card);
    border: 2px solid #2a3450;
    border-radius: 10px;
    padding: 14px 12px;
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .answer-btn:hover { border-color: var(--accent); }
  .answer-btn.correct {
    background: #1a3a1a;
    border-color: #4CAF50;
    color: #4CAF50;
  }
  .answer-btn.wrong {
    background: #3a1a1a;
    border-color: #F44336;
    color: #F44336;
  }
  .answer-btn.highlight-correct {
    background: #1a3a1a;
    border-color: #4CAF50;
    color: #4CAF50;
  }

  #step-feedback {
    text-align: center;
    margin-bottom: 12px;
    font-weight: bold;
    font-size: 1.1rem;
  }

  #step-continue {
    text-align: center;
    margin-bottom: 16px;
  }

  /* Title card */
  .title-card {
    text-align: center;
    padding: 30px 20px;
  }
  .title-card h2 {
    color: var(--accent);
    font-size: 1.4rem;
    margin-bottom: 12px;
  }
  .title-card .trigger {
    color: #aaa;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .title-card .step-count {
    color: #666;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  /* Branches card */
  .branches-card {
    background: var(--card);
    border: 1px solid #2a3450;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .branches-card h3 {
    color: var(--accent);
    font-size: 1rem;
    margin-bottom: 12px;
  }
  .branch-section {
    margin-bottom: 12px;
  }
  .branch-label {
    font-weight: bold;
    color: #FF9800;
    font-size: 0.9rem;
    margin-bottom: 4px;
  }
  .branch-step {
    font-size: 0.85rem;
    color: #aaa;
    padding: 4px 0 4px 16px;
  }

  /* Session complete */
  #session-complete {
    max-width: 500px;
    width: 100%;
    text-align: center;
  }
  .session-stats {
    background: var(--card);
    border: 1px solid #2a3450;
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
  }
  .stat-line {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.9rem;
  }
  .stat-label { color: #888; }
  .stat-value { color: var(--accent); font-weight: bold; }

  /* Streak animation */
  @keyframes streakPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  .streak-pulse {
    animation: streakPulse 0.3s ease;
  }

  /* Feedback bar */
  .feedback-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #0d1117;
    border-top: 1px solid #2a3450;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 200;
    font-size: 0.8rem;
  }
  .feedback-bar input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #2a3450;
    background: #141b2d;
    color: #e0e0e0;
    font-size: 0.85rem;
  }
  .feedback-bar input::placeholder { color: #555; }
  .feedback-bar button {
    background: #ff9800;
    color: #0a0e1a;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .feedback-bar button:hover { background: #ffa726; }
  .feedback-bar .fb-status {
    color: #888;
    font-size: 0.75rem;
    white-space: nowrap;
  }
  .feedback-bar .fb-count {
    color: #ff9800;
    font-size: 0.75rem;
    white-space: nowrap;
  }
</style>
</head>
<body>

<h1 id="game-title">Emergency Procedures</h1>
<div class="subtitle" id="game-subtitle">Cessna 172S G1000 — Memory Items</div>

<!-- Start screen -->
<div class="start-screen" id="start-screen">
  <p style="margin-bottom:16px; font-size:0.9rem; color:#aaa;">Master emergency checklists step by step. Each procedure unlocks after reaching 70% mastery on the previous one.</p>

  <div style="margin-bottom:16px; text-align:center;">
    <div style="display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:8px;">
      <button class="next-btn" id="avatar-prev" style="padding:6px 12px; font-size:0.8rem;">&lt;</button>
      <img id="start-avatar" width="80" height="80" style="border-radius:50%; background:#1e2740; cursor:pointer;" title="Click arrows to customize">
      <button class="next-btn" id="avatar-next" style="padding:6px 12px; font-size:0.8rem;">&gt;</button>
    </div>
    <div style="display:flex; justify-content:center; gap:8px; margin-bottom:8px;">
      <button class="next-btn" id="avatar-boy" style="padding:5px 14px; font-size:0.75rem; background:#4D96FF;">Boy</button>
      <button class="next-btn" id="avatar-girl" style="padding:5px 14px; font-size:0.75rem; background:#FF6B9D;">Girl</button>
    </div>
    <div id="unlockables-display" class="unlockables" style="margin:0;"></div>
  </div>

  <div style="margin-bottom:16px;">
    <label style="font-size:0.75rem; color:#888; text-transform:uppercase; letter-spacing:1px;">Theme</label>
    <div id="theme-picker" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:6px;"></div>
  </div>

  <div style="margin-bottom:16px;">
    <label style="font-size:0.85rem; color:#888;">Player Name:</label><br>
    <input type="text" id="player-name" placeholder="Enter your name"
      style="margin-top:6px; padding:10px 16px; border-radius:8px; border:1px solid #2a3450;
             background:#141b2d; color:#e0e0e0; font-size:1rem; width:100%; max-width:280px;">
  </div>
  <button class="next-btn" id="start-btn">Start Studying</button>

  <div id="procedure-list" style="margin-top:20px; width:100%; display:flex; flex-direction:column; align-items:center;"></div>

  <div style="margin: 16px 0; text-align: center;">
    <a href="airspace-quiz.html" style="color: var(--accent); font-size: 0.85rem; text-decoration: none; border: 1px solid var(--accent); padding: 8px 16px; border-radius: 8px; display: inline-block;">
      Switch to Airspace Quiz &rarr;
    </a>
  </div>

  <div id="home-leaderboard" style="margin-top:20px; width:100%;"></div>
  <div id="version-label" style="margin-top:12px; font-size:0.7rem; color:#555; text-align:center;"></div>
</div>

<!-- Study screen -->
<div id="study-screen" style="display:none">
  <div id="study-header">
    <button id="back-to-menu" class="next-btn" style="padding:8px 14px; font-size:0.8rem;">&larr; Menu</button>
    <div id="study-procedure-name"></div>
    <div id="study-progress"></div>
  </div>
  <div id="step-history"></div>
  <div id="current-step-area"></div>
  <div id="step-answers"></div>
  <div id="step-feedback" style="display:none"></div>
  <div id="step-continue" style="display:none">
    <button id="continue-btn" class="next-btn">Got it — what's next?</button>
  </div>
</div>

<!-- Session complete -->
<div id="session-complete" style="display:none"></div>

<!-- Feedback bar -->
<div class="feedback-bar">
  <input type="text" id="fb-input" placeholder="Note a bug, suggestion, or confusing question...">
  <button id="fb-submit">Save Note</button>
  <button id="fb-email" style="background:#1976D2; color:white; border:none; padding:8px 12px; border-radius:6px; font-size:0.75rem; cursor:pointer; white-space:nowrap;">Email Notes</button>
  <span class="fb-status" id="fb-status"></span>
  <span class="fb-count" id="fb-count"></span>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const APP_VERSION = '1.0.0';
const PROFILES_KEY = 'learning-looper-profiles';
const CURRENT_PLAYER_KEY = 'learning-looper-current-player';
const SESSIONS_KEY = 'learning-looper-emergency-sessions';
const FEEDBACK_KEY = 'learning-looper-feedback-log';

const PROCEDURE_ORDER = [
  'engine_failure_in_flight',
  'engine_fire_in_flight',
  'electrical_fire_in_flight',
  'engine_failure_takeoff_roll',
  'engine_failure_after_takeoff',
  'spin_recovery'
];

const $ = id => document.getElementById(id);

// ============================================================
// THEME SYSTEM — same as airspace quiz
// ============================================================
const THEMES = [
  {
    id: 'pilot', name: 'Pilot Mode', icon: '\u2708\uFE0F', pointsNeeded: 0,
    bg: '#0a0e1a', card: '#141b2d', text: '#e0e0e0', accent: '#64ffda',
    confettiColors: undefined
  },
  {
    id: 'cupcake', name: 'Bakery Mode', icon: '\uD83E\uDDC1', pointsNeeded: 100,
    bg: '#fff0f5', card: '#fff8fa', text: '#4a2040', accent: '#ff69b4',
    confettiColors: ['#ff69b4', '#ffb6c1', '#ff1493', '#fff0f5', '#ffc0cb']
  },
  {
    id: 'kawaii', name: 'Kawaii Mode', icon: '\uD83C\uDF38', pointsNeeded: 400,
    bg: '#fef0ff', card: '#fff5fe', text: '#5b2065', accent: '#e040fb',
    confettiColors: ['#e040fb', '#ff80ab', '#ea80fc', '#ce93d8', '#f8bbd0']
  },
  {
    id: 'glam', name: 'Glam Mode', icon: '\uD83D\uDC85', pointsNeeded: 700,
    bg: '#fff5f5', card: '#fff0f8', text: '#880050', accent: '#ff1493',
    confettiColors: ['#ff1493', '#ff69b4', '#ff00ff', '#ffb7ce', '#ff85a2']
  },
  {
    id: 'warrior', name: 'Warrior Mode', icon: '\u2694\uFE0F', pointsNeeded: 1000,
    bg: '#1a0a00', card: '#2d1a0a', text: '#ffd700', accent: '#ff8c00',
    confettiColors: ['#ff8c00', '#ffd700', '#ff4500', '#8b0000', '#daa520']
  },
  {
    id: 'anime', name: 'Anime Mode', icon: '\uD83D\uDD25', pointsNeeded: 1500,
    bg: '#0a001a', card: '#1a0a2d', text: '#00ffff', accent: '#ff4500',
    confettiColors: ['#ff4500', '#ff6347', '#00ffff', '#7b68ee', '#ff1493']
  },
  {
    id: 'retro', name: 'Arcade Mode', icon: '\uD83D\uDC7E', pointsNeeded: 2000,
    bg: '#000000', card: '#111111', text: '#00ff00', accent: '#00ff00',
    confettiColors: ['#00ff00', '#00cc00', '#009900', '#33ff33', '#66ff66']
  },
  {
    id: 'space', name: 'Space Mode', icon: '\uD83D\uDE80', pointsNeeded: 3000,
    bg: '#05001a', card: '#0a0025', text: '#c8d8ff', accent: '#7b68ee',
    confettiColors: ['#7b68ee', '#6a5acd', '#483d8b', '#9370db', '#ba55d3']
  },
];

let currentTheme = THEMES[0];

function applyTheme(theme) {
  currentTheme = theme;
  document.documentElement.style.setProperty('--bg', theme.bg);
  document.documentElement.style.setProperty('--card', theme.card);
  document.documentElement.style.setProperty('--text', theme.text);
  document.documentElement.style.setProperty('--accent', theme.accent);
  document.querySelectorAll('.feedback-bar').forEach(el => {
    el.style.background = theme.card;
    el.style.borderTopColor = theme.accent + '44';
  });
}

function getUnlockedThemes(totalScore) {
  return THEMES.filter(t => totalScore >= t.pointsNeeded);
}

function renderThemePicker() {
  const picker = $('theme-picker');
  if (!picker) return;
  const profile = profiles[$('player-name').value.trim() || loadCurrentPlayer()] || {};
  const totalScore = profile.totalPoints || 0;
  const currentId = state.selectedTheme || profile.theme || 'pilot';
  picker.innerHTML = '';
  THEMES.forEach(t => {
    const unlocked = totalScore >= t.pointsNeeded;
    const selected = t.id === currentId;
    const btn = document.createElement('span');
    btn.className = 'unlockable-item ' + (unlocked ? 'unlocked' : 'locked');
    btn.style.cursor = unlocked ? 'pointer' : 'default';
    btn.style.fontSize = '0.8rem';
    btn.style.padding = '4px 10px';
    if (selected && unlocked) {
      btn.style.outline = '2px solid var(--accent)';
      btn.style.outlineOffset = '1px';
    }
    btn.textContent = unlocked ? `${t.icon} ${t.name}` : `${t.icon} ${t.name} (${t.pointsNeeded} pts)`;
    if (unlocked) {
      btn.onclick = () => {
        state.selectedTheme = t.id;
        applyTheme(t);
        const name = $('player-name').value.trim();
        if (name && profiles[name]) { profiles[name].theme = t.id; saveProfiles(); }
        renderThemePicker();
      };
    }
    picker.appendChild(btn);
  });
}

// ============================================================
// AVATAR SYSTEM — same as airspace quiz
// ============================================================
const AVATAR_BASE = 'https://api.dicebear.com/9.x/adventurer/svg';

const AVATAR_PRESETS = {
  boy: [
    { hair: 'short01', skinColor: 'f2d3b1', eyes: 'variant01', mouth: 'variant01', eyebrows: 'variant01' },
    { hair: 'short02', skinColor: 'ecad80', eyes: 'variant02', mouth: 'variant02', eyebrows: 'variant02' },
    { hair: 'short04', skinColor: '9e5622', eyes: 'variant04', mouth: 'variant05', eyebrows: 'variant04' },
    { hair: 'short05', skinColor: 'f2d3b1', eyes: 'variant06', mouth: 'variant08', eyebrows: 'variant06' },
    { hair: 'short07', skinColor: '763900', eyes: 'variant09', mouth: 'variant10', eyebrows: 'variant09' },
    { hair: 'short10', skinColor: 'ecad80', eyes: 'variant12', mouth: 'variant14', eyebrows: 'variant12' },
  ],
  girl: [
    { hair: 'long01', skinColor: 'f2d3b1', eyes: 'variant03', mouth: 'variant03', eyebrows: 'variant03' },
    { hair: 'long02', skinColor: 'ecad80', eyes: 'variant05', mouth: 'variant06', eyebrows: 'variant05' },
    { hair: 'long04', skinColor: '9e5622', eyes: 'variant07', mouth: 'variant09', eyebrows: 'variant07' },
    { hair: 'long06', skinColor: 'f2d3b1', eyes: 'variant10', mouth: 'variant12', eyebrows: 'variant10' },
    { hair: 'long10', skinColor: '763900', eyes: 'variant13', mouth: 'variant15', eyebrows: 'variant13' },
    { hair: 'long15', skinColor: 'ecad80', eyes: 'variant15', mouth: 'variant17', eyebrows: 'variant15' },
  ]
};

const AVATAR_UNLOCKS = [
  { id: 'none',       name: 'None',          pointsNeeded: 0,    overrides: {} },
  { id: 'glasses',    name: 'Glasses',       pointsNeeded: 300,  overrides: { glasses: 'variant01', glassesProbability: 100 } },
  { id: 'earrings',   name: 'Earrings',      pointsNeeded: 800,  overrides: { earrings: 'variant01', earringsProbability: 100 } },
  { id: 'freckles',   name: 'Freckles',      pointsNeeded: 1500, overrides: { features: 'freckles', featuresProbability: 100 } },
  { id: 'mustache',   name: 'Mustache',      pointsNeeded: 3000, overrides: { features: 'mustache', featuresProbability: 100 } },
  { id: 'blush',      name: 'Blush',         pointsNeeded: 5000, overrides: { features: 'blush', featuresProbability: 100 } },
];

function buildAvatarURL(gender, presetIdx, unlockId) {
  const presets = AVATAR_PRESETS[gender] || AVATAR_PRESETS.boy;
  const p = presets[presetIdx % presets.length];
  const unlock = AVATAR_UNLOCKS.find(u => u.id === unlockId) || AVATAR_UNLOCKS[0];
  const params = {
    hair: p.hair, skinColor: p.skinColor, eyes: p.eyes, mouth: p.mouth, eyebrows: p.eyebrows,
    earringsProbability: 0, glassesProbability: 0, featuresProbability: 0,
    backgroundColor: '1e2740', radius: 50,
    ...unlock.overrides
  };
  const qs = Object.entries(params).map(([k, v]) => `${k}=${v}`).join('&');
  return `${AVATAR_BASE}?${qs}`;
}

function buildAvatarImg(gender, presetIdx, unlockId, size) {
  return `<img src="${buildAvatarURL(gender, presetIdx, unlockId)}" width="${size}" height="${size}" style="border-radius:50%; background:#1e2740;">`;
}

function getUnlockedAccessories(totalScore) {
  return AVATAR_UNLOCKS.filter(a => totalScore >= a.pointsNeeded);
}

function renderAvatarPicker() {
  const profile = profiles[$('player-name').value.trim() || loadCurrentPlayer()] || {};
  const totalScore = profile.totalPoints || 0;
  state.avatarGender = state.avatarGender ?? profile.avatarGender ?? 'boy';
  state.avatarPreset = state.avatarPreset ?? profile.avatarPreset ?? 0;
  state.selectedAccessory = state.selectedAccessory ?? profile.accessory ?? 'none';

  const avatarEl = $('start-avatar');
  avatarEl.src = buildAvatarURL(state.avatarGender, state.avatarPreset, state.selectedAccessory);

  $('avatar-boy').style.opacity = state.avatarGender === 'boy' ? '1' : '0.4';
  $('avatar-girl').style.opacity = state.avatarGender === 'girl' ? '1' : '0.4';

  const unlockDiv = $('unlockables-display');
  unlockDiv.innerHTML = '';
  AVATAR_UNLOCKS.forEach(acc => {
    if (acc.id === 'none') return;
    const isUnlocked = totalScore >= acc.pointsNeeded;
    const isSelected = acc.id === state.selectedAccessory;
    const item = document.createElement('span');
    item.className = 'unlockable-item ' + (isUnlocked ? 'unlocked' : 'locked');
    item.textContent = isUnlocked ? (isSelected ? `[${acc.name}]` : acc.name) : `${acc.name} (${acc.pointsNeeded} pts)`;
    item.style.cursor = isUnlocked ? 'pointer' : 'default';
    if (isUnlocked) {
      item.onclick = () => {
        state.selectedAccessory = state.selectedAccessory === acc.id ? 'none' : acc.id;
        saveAvatarToProfile();
        renderAvatarPicker();
      };
    }
    unlockDiv.appendChild(item);
  });
}

function saveAvatarToProfile() {
  const name = $('player-name').value.trim();
  if (name && profiles[name]) {
    profiles[name].avatarGender = state.avatarGender;
    profiles[name].avatarPreset = state.avatarPreset;
    profiles[name].accessory = state.selectedAccessory;
    saveProfiles();
  }
}

// ============================================================
// PLAYER PROFILES & LEADERBOARD (localStorage)
// ============================================================
function loadProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      let migrated = false;
      for (const name in parsed) {
        if (!parsed[name] || typeof parsed[name] !== 'object') {
          delete parsed[name];
          migrated = true;
          continue;
        }
        if (!parsed[name].subjects) {
          parsed[name] = migrateProfile(parsed[name]);
          migrated = true;
        }
      }
      if (migrated) {
        try { localStorage.setItem(PROFILES_KEY, JSON.stringify(parsed)); } catch (e) {}
      }
      return parsed;
    }
  } catch (e) {}
  return {};
}

function migrateProfile(p) {
  if (p.subjects) return p;
  const airspace = {
    bestScore: p.bestScore || 0,
    totalPoints: p.totalPoints || p.bestScore || 0,
    bestStreak: p.bestStreak || 0,
    highestLevel: p.highestLevel || 0,
    gamesPlayed: p.gamesPlayed || 0
  };
  return {
    totalPoints: p.totalPoints || p.bestScore || 0,
    avatarGender: p.avatarGender,
    avatarPreset: p.avatarPreset,
    accessory: p.accessory,
    theme: p.theme,
    lastPlayed: p.lastPlayed,
    subjects: { airspace }
  };
}

function saveProfiles() {
  try { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); } catch (e) {}
}

function saveCurrentPlayer(name) {
  try { localStorage.setItem(CURRENT_PLAYER_KEY, name); } catch (e) {}
}

function loadCurrentPlayer() {
  try { return localStorage.getItem(CURRENT_PLAYER_KEY) || ''; } catch (e) { return ''; }
}

function initEmergencyProfile(profile) {
  if (!profile.subjects) profile.subjects = {};
  if (!profile.subjects.emergency) {
    profile.subjects.emergency = {
      bestScore: 0,
      totalPoints: 0,
      bestStreak: 0,
      gamesPlayed: 0,
      aircraft: 'c172s',
      procedures: {}
    };
  }
}

let profiles = loadProfiles();

// ============================================================
// STATE
// ============================================================
let emergencyData = null;
let state = {
  playerName: '',
  avatarGender: null,
  avatarPreset: null,
  selectedAccessory: null,
  selectedTheme: null,
  currentProcedure: null,
  currentStepIndex: 0,
  missedSteps: [],
  firstTryCorrect: [],
  sessionScore: 0,
  sessionStreak: 0,
  bestStreak: 0,
  sessionStartTime: 0,
  quizStartTime: 0,
  stepResults: [],
  retesting: false,
  retestQueue: []
};

// ============================================================
// PROCEDURE LIST RENDERING
// ============================================================
function getCategoryForProcedure(id) {
  if (id === 'spin_recovery') return 'spin';
  if (id.includes('fire')) return 'fire';
  return 'engine';
}

function getMasteryClass(pct) {
  if (pct <= 0) return 'gray';
  if (pct < 90) return 'progress';
  if (pct < 100) return 'mastered';
  return 'perfect';
}

function isProcedureUnlocked(index) {
  if (index === 0) return true;
  const prevId = PROCEDURE_ORDER[index - 1];
  const profile = profiles[state.playerName];
  if (!profile || !profile.subjects || !profile.subjects.emergency) return false;
  const prevProc = profile.subjects.emergency.procedures[prevId];
  return prevProc && (prevProc.mastery_pct || 0) >= 70;
}

function renderProcedureList() {
  const container = $('procedure-list');
  if (!container || !emergencyData) return;
  container.innerHTML = '';

  PROCEDURE_ORDER.forEach((id, index) => {
    const procedure = emergencyData.procedures.find(p => p.id === id);
    if (!procedure) return;

    const profile = profiles[state.playerName];
    const procData = profile?.subjects?.emergency?.procedures?.[id];
    const masteryPct = procData?.mastery_pct || 0;
    const unlocked = isProcedureUnlocked(index);
    const category = getCategoryForProcedure(id);

    const card = document.createElement('div');
    card.className = 'procedure-card' + (unlocked ? '' : ' locked');
    card.dataset.category = category;

    const leftDiv = document.createElement('div');
    leftDiv.style.cssText = 'flex:1; min-width:0;';

    const nameDiv = document.createElement('div');
    nameDiv.style.cssText = 'font-weight:bold; font-size:0.9rem; margin-bottom:6px;';
    nameDiv.textContent = unlocked ? procedure.name : '\uD83D\uDD12 ' + procedure.name;
    leftDiv.appendChild(nameDiv);

    const barBg = document.createElement('div');
    barBg.className = 'mastery-bar-bg';
    const barFill = document.createElement('div');
    barFill.className = 'mastery-bar-fill ' + getMasteryClass(masteryPct);
    barFill.style.width = masteryPct + '%';
    barBg.appendChild(barFill);
    leftDiv.appendChild(barBg);

    const pctLabel = document.createElement('div');
    pctLabel.style.cssText = 'font-size:0.7rem; color:#888; margin-top:4px;';
    pctLabel.textContent = masteryPct + '% mastery';
    if (masteryPct >= 90) {
      const badge = document.createElement('span');
      badge.className = 'irl-badge';
      badge.style.marginLeft = '8px';
      badge.textContent = masteryPct >= 100 ? 'SUPER BONUS!' : 'IRL Reward!';
      pctLabel.appendChild(badge);
    }
    leftDiv.appendChild(pctLabel);

    card.appendChild(leftDiv);

    if (unlocked) {
      const studyBtn = document.createElement('button');
      studyBtn.className = 'next-btn';
      studyBtn.style.cssText = 'padding:8px 16px; font-size:0.8rem; margin-left:12px; white-space:nowrap;';
      studyBtn.textContent = 'Study';
      studyBtn.onclick = () => startStudySession(id);
      card.appendChild(studyBtn);
    }

    container.appendChild(card);
  });
}

function renderLeaderboard(targetId) {
  const list = Object.entries(profiles)
    .map(([name, p]) => ({ name, ...p }))
    .sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

  const container = $(targetId || 'home-leaderboard');
  if (!container) return;
  if (list.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:#888;">No scores yet — be the first!</p>';
    return;
  }

  const medals = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
  container.innerHTML = list.map((p, i) => {
    const emergency = p.subjects?.emergency || {};
    const masteredCount = PROCEDURE_ORDER.filter(id =>
      (emergency.procedures?.[id]?.mastery_pct || 0) >= 90
    ).length;
    return `
    <div class="lb-entry" data-player="${p.name}" style="background:${i === 0 ? '#1a2a1a' : 'var(--card)'}; border:1px solid ${i === 0 ? '#2a4a2a' : '#2a3450'};"
         onmouseover="this.style.outline='2px solid var(--accent)'" onmouseout="this.style.outline='none'">
      <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:1.2rem;">${medals[i] || `#${i+1}`}</span>
        ${buildAvatarImg(p.avatarGender || 'boy', p.avatarPreset || 0, p.accessory || 'none', 36)}
        <strong>${p.name}</strong>
      </div>
      <div style="text-align:right; font-size:0.85rem;">
        <div style="color:var(--accent); font-weight:bold; font-size:1.1rem;">${p.totalPoints || 0}</div>
        <div style="color:#888;">Emergency: ${masteredCount}/6 mastered</div>
      </div>
    </div>
  `}).join('');

  container.querySelectorAll('.lb-entry').forEach(el => {
    el.onclick = () => {
      const name = el.dataset.player;
      $('player-name').value = name;
      const p = profiles[name];
      if (p) {
        state.avatarGender = p.avatarGender ?? 'boy';
        state.avatarPreset = p.avatarPreset ?? 0;
        state.selectedAccessory = p.accessory || 'none';
      }
      const th = THEMES.find(t => t.id === p?.theme);
      if (th) { state.selectedTheme = th.id; applyTheme(th); }
      renderAvatarPicker();
      renderThemePicker();
      handleStartBtn();
    };
  });
}

// ============================================================
// STUDY SESSION — PROGRESSIVE DISCLOSURE
// ============================================================
function startStudySession(procedureId) {
  const procedure = emergencyData.procedures.find(p => p.id === procedureId);
  if (!procedure) return;

  state.currentProcedure = procedure;
  state.currentStepIndex = 0;
  state.missedSteps = [];
  state.firstTryCorrect = [];
  state.sessionScore = 0;
  state.sessionStreak = 0;
  state.bestStreak = 0;
  state.sessionStartTime = Date.now();
  state.stepResults = [];
  state.retesting = false;
  state.retestQueue = [];

  $('start-screen').style.display = 'none';
  $('study-screen').style.display = 'block';
  $('study-procedure-name').textContent = procedure.name;
  $('study-progress').textContent = `0/${procedure.steps.length} steps`;

  showTitleCard(procedure);
}

function showTitleCard(procedure) {
  $('step-history').innerHTML = '';
  $('step-answers').innerHTML = '';
  $('step-feedback').style.display = 'none';
  $('step-continue').style.display = 'none';

  $('current-step-area').innerHTML = `
    <div class="title-card">
      <h2>${procedure.name}</h2>
      <div class="trigger">${procedure.trigger}</div>
      <div class="step-count">${procedure.steps.length} steps to learn</div>
      <button class="next-btn" id="ready-btn">Ready? &rarr;</button>
    </div>
  `;

  $('ready-btn').onclick = () => revealStep(0);
}

function revealStep(index) {
  const procedure = state.currentProcedure;
  const step = procedure.steps[index];
  if (!step) return;

  $('step-answers').innerHTML = '';
  $('step-feedback').style.display = 'none';
  $('step-continue').style.display = 'block';

  // Build history of completed steps
  renderStepHistory(index);

  // Show current step
  const mnemonicPrefix = step.mnemonic ? `<span style="color:#FF9800; font-weight:bold;">${step.mnemonic}</span> — ` : '';
  $('current-step-area').innerHTML = `
    <div style="font-size:0.8rem; color:#888; margin-bottom:8px;">Step ${index + 1} of ${procedure.steps.length}</div>
    <div class="step-action">${mnemonicPrefix}${step.action} &rarr; ${step.target}</div>
    <div class="step-why">${step.why}</div>
    <button class="source-btn" onclick="toggleSource(this, '${procedure.source}')">Show Source</button>
    <div class="source-info" style="display:none;"></div>
  `;

  $('study-progress').textContent = `${index + 1}/${procedure.steps.length} steps`;

  // Continue button
  const continueBtn = $('continue-btn');
  continueBtn.textContent = "Got it — what's next?";
  continueBtn.onclick = () => {
    const nextIndex = index + 1;
    if (nextIndex < procedure.steps.length) {
      quizStep(nextIndex);
    } else {
      showBranches(procedure);
    }
  };
}

function renderStepHistory(upToIndex) {
  const history = $('step-history');
  history.innerHTML = '';
  const procedure = state.currentProcedure;
  for (let i = 0; i < upToIndex; i++) {
    const s = procedure.steps[i];
    const mnemonicPrefix = s.mnemonic ? `${s.mnemonic} — ` : '';
    const div = document.createElement('div');
    div.className = 'history-step';
    div.textContent = `Step ${i + 1}: ${mnemonicPrefix}${s.action} \u2192 ${s.target}`;
    history.appendChild(div);
  }
  history.scrollTop = history.scrollHeight;
}

// ============================================================
// QUIZ STEP
// ============================================================
function quizStep(index) {
  const procedure = state.currentProcedure;
  const correctStep = procedure.steps[index];
  if (!correctStep) return;

  $('step-feedback').style.display = 'none';
  $('step-continue').style.display = 'none';

  renderStepHistory(index);

  $('current-step-area').innerHTML = `
    <div id="step-prompt" style="font-size:1.2rem; font-weight:bold; color:var(--accent);">What's Step ${index + 1}?</div>
  `;

  // Generate distractors and render answers
  const distractors = generateDistractors(procedure, index, emergencyData.procedures);
  const options = [{ action: correctStep.action, target: correctStep.target, isCorrect: true }];
  distractors.forEach(d => options.push({ action: d.action, target: d.target, isCorrect: false }));
  shuffleArray(options);

  const answersDiv = $('step-answers');
  answersDiv.innerHTML = '';
  state.quizStartTime = Date.now();

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = `${opt.action} \u2192 ${opt.target}`;
    btn.onclick = () => handleAnswer(opt, correctStep, index, answersDiv);
    answersDiv.appendChild(btn);
  });

  $('study-progress').textContent = `${index}/${procedure.steps.length} steps`;
}

function generateDistractors(procedure, stepIndex, allProcedures) {
  const correct = procedure.steps[stepIndex];
  const correctKey = correct.action + '|' + correct.target;
  const candidates = [];
  const seen = new Set([correctKey]);

  // Source 1: Same procedure, different positions
  procedure.steps.forEach((s, i) => {
    if (i === stepIndex) return;
    const key = s.action + '|' + s.target;
    if (!seen.has(key)) {
      seen.add(key);
      candidates.push({ action: s.action, target: s.target, priority: 1 });
    }
  });

  // Source 2: Other procedures, same position
  allProcedures.forEach(proc => {
    if (proc.id === procedure.id) return;
    const s = proc.steps[stepIndex];
    if (s) {
      const key = s.action + '|' + s.target;
      if (!seen.has(key)) {
        seen.add(key);
        candidates.push({ action: s.action, target: s.target, priority: 2 });
      }
    }
  });

  // Source 3: Any other procedure steps
  allProcedures.forEach(proc => {
    if (proc.id === procedure.id) return;
    proc.steps.forEach(s => {
      const key = s.action + '|' + s.target;
      if (!seen.has(key)) {
        seen.add(key);
        candidates.push({ action: s.action, target: s.target, priority: 3 });
      }
    });
  });

  // Sort by priority, then shuffle within priority
  candidates.sort((a, b) => a.priority - b.priority);
  // Shuffle within each priority group
  const grouped = {};
  candidates.forEach(c => {
    if (!grouped[c.priority]) grouped[c.priority] = [];
    grouped[c.priority].push(c);
  });
  const result = [];
  for (const g of Object.values(grouped)) {
    shuffleArray(g);
    result.push(...g);
  }

  return result.slice(0, 3);
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// ANSWER HANDLING
// ============================================================
function handleAnswer(selected, correctStep, stepIndex, answersDiv) {
  const responseMs = Date.now() - state.quizStartTime;
  const procedure = state.currentProcedure;
  const isCorrect = selected.isCorrect;

  // Disable all buttons
  answersDiv.querySelectorAll('.answer-btn').forEach(btn => {
    btn.disabled = true;
    btn.style.cursor = 'default';
    const btnText = btn.textContent;
    const correctText = `${correctStep.action} \u2192 ${correctStep.target}`;
    if (btnText === correctText) {
      btn.classList.add('highlight-correct');
    }
    if (!isCorrect && btnText === `${selected.action} \u2192 ${selected.target}`) {
      btn.classList.add('wrong');
    }
  });

  if (isCorrect) {
    state.sessionStreak++;
    state.bestStreak = Math.max(state.bestStreak, state.sessionStreak);

    // Points: 10 base + streak bonus
    let points = state.retesting ? 5 : 10;
    if (state.sessionStreak >= 3) {
      points += Math.min(5 * (state.sessionStreak - 2), 15);
    }
    state.sessionScore += points;

    if (!state.retesting) {
      state.firstTryCorrect.push(stepIndex);
    }

    // Record step result
    state.stepResults.push({ stepIndex, correct: true, responseMs, retest: state.retesting });

    // Update per-step mastery
    updateStepMastery(procedure.id, String(correctStep.order), true, responseMs);

    $('step-feedback').style.display = 'block';
    $('step-feedback').innerHTML = `<span style="color:#4CAF50;">\u2713 Correct!</span> <span style="color:#888; font-size:0.85rem;">+${points} pts</span>`;

    if (state.sessionStreak >= 3) {
      answersDiv.classList.add('streak-pulse');
      setTimeout(() => answersDiv.classList.remove('streak-pulse'), 300);
    }

    // Show step reveal with WHY
    const step = correctStep;
    const mnemonicPrefix = step.mnemonic ? `<span style="color:#FF9800; font-weight:bold;">${step.mnemonic}</span> — ` : '';
    $('current-step-area').innerHTML = `
      <div style="font-size:0.8rem; color:#888; margin-bottom:8px;">Step ${stepIndex + 1} of ${procedure.steps.length}</div>
      <div class="step-action">${mnemonicPrefix}${step.action} &rarr; ${step.target}</div>
      <div class="step-why">${step.why}</div>
      <button class="source-btn" onclick="toggleSource(this, '${procedure.source}')">Show Source</button>
      <div class="source-info" style="display:none;"></div>
    `;
  } else {
    state.sessionStreak = 0;

    if (!state.retesting) {
      state.missedSteps.push(stepIndex);
    }

    state.stepResults.push({ stepIndex, correct: false, responseMs, retest: state.retesting });

    updateStepMastery(procedure.id, String(correctStep.order), false, responseMs);

    $('step-feedback').style.display = 'block';
    $('step-feedback').innerHTML = `<span style="color:#F44336;">\u2717 Not quite</span>`;

    // Show correct answer with WHY
    const step = correctStep;
    const mnemonicPrefix = step.mnemonic ? `<span style="color:#FF9800; font-weight:bold;">${step.mnemonic}</span> — ` : '';
    $('current-step-area').innerHTML = `
      <div style="font-size:0.8rem; color:#888; margin-bottom:8px;">Step ${stepIndex + 1} — Correct answer:</div>
      <div class="step-action">${mnemonicPrefix}${step.action} &rarr; ${step.target}</div>
      <div class="step-why">${step.why}</div>
      <button class="source-btn" onclick="toggleSource(this, '${procedure.source}')">Show Source</button>
      <div class="source-info" style="display:none;"></div>
    `;
  }

  // Continue button
  $('step-continue').style.display = 'block';
  const continueBtn = $('continue-btn');
  continueBtn.textContent = "Got it — what's next?";

  if (state.retesting) {
    continueBtn.onclick = () => {
      if (!isCorrect) {
        // Re-add to retest queue
        state.retestQueue.push(stepIndex);
      }
      continueRetest();
    };
  } else {
    continueBtn.onclick = () => {
      const nextIndex = stepIndex + 1;
      if (nextIndex < procedure.steps.length) {
        quizStep(nextIndex);
      } else {
        showBranches(procedure);
      }
    };
  }
}

// ============================================================
// BRANCHES
// ============================================================
function showBranches(procedure) {
  if (!procedure.branches) {
    startRetest();
    return;
  }

  $('step-answers').innerHTML = '';
  $('step-feedback').style.display = 'none';
  $('step-continue').style.display = 'block';

  renderStepHistory(procedure.steps.length);

  let branchHTML = '<div class="branches-card"><h3>What happens next depends on the situation:</h3>';
  for (const [key, branch] of Object.entries(procedure.branches)) {
    branchHTML += `<div class="branch-section">`;
    branchHTML += `<div class="branch-label">${branch.label}:</div>`;
    branch.steps.forEach(s => {
      branchHTML += `<div class="branch-step">${s.action} \u2192 ${s.target}</div>`;
    });
    branchHTML += `</div>`;
  }
  branchHTML += '</div>';

  $('current-step-area').innerHTML = branchHTML;

  const continueBtn = $('continue-btn');
  continueBtn.textContent = 'Continue \u2192';
  continueBtn.onclick = () => startRetest();
}

// ============================================================
// RE-TEST MISSED STEPS
// ============================================================
function startRetest() {
  if (state.missedSteps.length === 0) {
    finishProcedure();
    return;
  }

  state.retesting = true;
  state.retestQueue = [...state.missedSteps];

  $('step-answers').innerHTML = '';
  $('step-feedback').style.display = 'none';
  $('step-continue').style.display = 'block';

  $('current-step-area').innerHTML = `
    <div style="padding:20px; text-align:center;">
      <div style="font-size:1.1rem; font-weight:bold; color:#FF9800; margin-bottom:8px;">Let's review the steps you missed</div>
      <div style="color:#888; font-size:0.9rem;">${state.retestQueue.length} step${state.retestQueue.length > 1 ? 's' : ''} to review</div>
    </div>
  `;

  const continueBtn = $('continue-btn');
  continueBtn.textContent = "Let's go!";
  continueBtn.onclick = () => continueRetest();
}

function continueRetest() {
  if (state.retestQueue.length === 0) {
    finishProcedure();
    return;
  }

  const nextIndex = state.retestQueue.shift();
  quizStep(nextIndex);
}

// ============================================================
// MASTERY TRACKING
// ============================================================
function updateStepMastery(procedureId, stepOrder, wasCorrect, responseMs) {
  const profile = profiles[state.playerName];
  if (!profile) return;
  initEmergencyProfile(profile);

  const proc = profile.subjects.emergency.procedures[procedureId] ||
    { mastery_pct: 0, times_studied: 0, steps: {} };
  const step = proc.steps[stepOrder] ||
    { correct_count: 0, wrong_count: 0, last_seen: null, total_response_ms: 0, status: 'unseen' };

  if (wasCorrect) {
    step.correct_count++;
    step.total_response_ms += responseMs;
  } else {
    step.wrong_count++;
  }
  step.last_seen = new Date().toISOString();

  if (wasCorrect && step.correct_count >= 3) {
    step.status = 'solid';
  } else {
    step.status = 'shaky';
  }

  proc.steps[stepOrder] = step;
  profile.subjects.emergency.procedures[procedureId] = proc;
}

function recomputeMastery(procedureId, totalSteps) {
  const proc = profiles[state.playerName].subjects.emergency.procedures[procedureId];
  if (!proc) return 0;
  const solidCount = Object.values(proc.steps).filter(s => s.status === 'solid').length;
  proc.mastery_pct = Math.round((solidCount / totalSteps) * 100);
  return proc.mastery_pct;
}

// ============================================================
// FINISH PROCEDURE + SESSION COMPLETE
// ============================================================
function finishProcedure() {
  const procedure = state.currentProcedure;
  const profile = profiles[state.playerName];
  if (!profile || !procedure) {
    backToMenu();
    return;
  }

  initEmergencyProfile(profile);
  const proc = profile.subjects.emergency.procedures[procedure.id] ||
    { mastery_pct: 0, times_studied: 0, steps: {} };

  // Increment times_studied ONCE per session
  proc.times_studied = (proc.times_studied || 0) + 1;
  profile.subjects.emergency.procedures[procedure.id] = proc;

  // Recompute mastery
  const masteryPct = recomputeMastery(procedure.id, procedure.steps.length);

  // Update profile stats
  const emg = profile.subjects.emergency;
  emg.totalPoints = (emg.totalPoints || 0) + state.sessionScore;
  emg.bestScore = Math.max(emg.bestScore || 0, state.sessionScore);
  emg.bestStreak = Math.max(emg.bestStreak || 0, state.bestStreak);
  emg.gamesPlayed = (emg.gamesPlayed || 0) + 1;

  // Recompute top-level totalPoints
  profile.totalPoints = Object.values(profile.subjects)
    .reduce((sum, s) => sum + (s.totalPoints || 0), 0);

  profile.lastPlayed = new Date().toISOString();
  saveProfiles();

  // Session stats
  const durationSeconds = Math.round((Date.now() - state.sessionStartTime) / 1000);
  const stepsCorrectFirstTry = state.firstTryCorrect.length;
  const stepsTested = procedure.steps.length;
  const shakySteps = Object.entries(proc.steps)
    .filter(([, s]) => s.status === 'shaky')
    .map(([order]) => order);

  // Save session log
  saveSessionLog(procedure, {
    durationSeconds,
    stepsTested,
    stepsCorrectFirstTry: stepsCorrectFirstTry,
    stepsShaky: shakySteps,
    masteryPct,
    bestStreak: state.bestStreak,
    score: state.sessionScore
  });

  // Check for group mastery
  const allProcs = emg.procedures;
  const allMastered = PROCEDURE_ORDER.every(id => (allProcs[id]?.mastery_pct || 0) >= 90);

  // Determine celebration level
  const allCorrectFirstTry = stepsCorrectFirstTry === stepsTested;

  // Show session complete
  $('study-screen').style.display = 'none';
  $('session-complete').style.display = 'block';

  let html = `
    <h2 style="color:var(--accent); margin-bottom:4px;">${procedure.name}</h2>
    <div style="font-size:1.5rem; margin-bottom:12px;">${allCorrectFirstTry ? '\u2B50' : '\u2705'}</div>
    <div class="session-stats">
      <div class="stat-line">
        <span class="stat-label">Steps correct (first try)</span>
        <span class="stat-value">${stepsCorrectFirstTry}/${stepsTested}</span>
      </div>
      <div class="stat-line">
        <span class="stat-label">Mastery</span>
        <span class="stat-value">${masteryPct}%</span>
      </div>
      <div class="stat-line">
        <span class="stat-label">Points earned</span>
        <span class="stat-value">+${state.sessionScore}</span>
      </div>
      <div class="stat-line">
        <span class="stat-label">Best streak</span>
        <span class="stat-value">${state.bestStreak}</span>
      </div>
      <div class="stat-line">
        <span class="stat-label">Time</span>
        <span class="stat-value">${formatDuration(durationSeconds)}</span>
      </div>
    </div>
  `;

  // Mastery bar
  html += `
    <div style="margin:12px auto; max-width:300px;">
      <div class="mastery-bar-bg" style="height:10px;">
        <div class="mastery-bar-fill ${getMasteryClass(masteryPct)}" style="width:${masteryPct}%;"></div>
      </div>
      <div style="font-size:0.75rem; color:#888; margin-top:4px;">${masteryPct}% mastery</div>
    </div>
  `;

  // IRL reward badges
  if (masteryPct >= 100) {
    html += `<div class="irl-badge" style="background:#FFD700; font-size:0.85rem; padding:6px 16px; margin:12px 0; display:inline-block;">SUPER BONUS MEGA UNLOCK</div><br>`;
    html += `<div style="font-size:0.7rem; color:#888;">(beta feature)</div>`;
  } else if (masteryPct >= 90) {
    html += `<div class="irl-badge" style="font-size:0.85rem; padding:6px 16px; margin:12px 0; display:inline-block;">IRL Reward Available — ask Dad!</div><br>`;
    html += `<div style="font-size:0.7rem; color:#888;">(beta feature)</div>`;
  }

  // Group mastery
  if (allMastered) {
    html += `<div class="irl-badge" style="background:#e040fb; color:white; font-size:0.85rem; padding:6px 16px; margin:12px 0; display:inline-block;">ALL PROCEDURES MASTERED! IRL Mega Reward!</div><br>`;
  }

  // Buttons
  html += `<div style="margin-top:20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">`;
  html += `<button class="next-btn" onclick="startStudySession('${procedure.id}')">Study Again</button>`;

  // Find next procedure
  const currentIdx = PROCEDURE_ORDER.indexOf(procedure.id);
  if (currentIdx < PROCEDURE_ORDER.length - 1 && isProcedureUnlocked(currentIdx + 1)) {
    const nextId = PROCEDURE_ORDER[currentIdx + 1];
    const nextProc = emergencyData.procedures.find(p => p.id === nextId);
    if (nextProc) {
      html += `<button class="next-btn" onclick="startStudySession('${nextId}')" style="background:#FF9800;">Next: ${nextProc.name}</button>`;
    }
  }
  html += `<button class="next-btn" onclick="backToMenu()" style="background:#2a3450; color:var(--text);">Back to Menu</button>`;
  html += `</div>`;

  $('session-complete').innerHTML = html;

  // Celebrations
  if (allCorrectFirstTry) {
    celebrate('perfect_procedure');
  }
  if (masteryPct >= 90) {
    setTimeout(() => celebrate('mastery'), 500);
  }
  if (allMastered) {
    setTimeout(() => celebrate('mastery'), 1000);
  }
}

function formatDuration(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function backToMenu() {
  $('study-screen').style.display = 'none';
  $('session-complete').style.display = 'none';
  $('start-screen').style.display = 'block';
  renderProcedureList();
  renderLeaderboard('home-leaderboard');
}

// ============================================================
// SESSION LOGGING
// ============================================================
function saveSessionLog(procedure, stats) {
  const log = {
    timestamp: new Date().toISOString(),
    type: 'session_summary',
    player: state.playerName,
    subject: 'emergency',
    aircraft: 'c172s',
    mode: 'flashcard',
    procedure: procedure.id,
    duration_seconds: stats.durationSeconds,
    steps_tested: stats.stepsTested,
    steps_correct_first_try: stats.stepsCorrectFirstTry,
    steps_shaky: stats.stepsShaky,
    mastery_pct: stats.masteryPct,
    streak_best: stats.bestStreak,
    score: stats.score
  };
  try {
    const sessions = JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]');
    sessions.push(log);
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
  } catch (e) {}
}

// ============================================================
// CELEBRATIONS
// ============================================================
function celebrate(level) {
  if (typeof confetti === 'undefined') return;
  if (level === 'perfect_procedure') {
    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: currentTheme.confettiColors });
  } else if (level === 'mastery') {
    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: currentTheme.confettiColors || ['#FFD700', '#FFA000', '#FF6F00'] });
  }
}

// ============================================================
// SHOW SOURCE
// ============================================================
function toggleSource(btn, sourceKey) {
  const infoDiv = btn.nextElementSibling;
  if (infoDiv.style.display === 'none') {
    const sourceData = emergencyData.metadata.sources[sourceKey];
    if (sourceData) {
      let html = `<strong>${sourceData.label}</strong>`;
      if (sourceData.url) {
        html += `<br><a href="${sourceData.url}" target="_blank" rel="noopener">View source &rarr;</a>`;
      } else {
        html += `<br><em>Refer to your aircraft's POH</em>`;
      }
      if (sourceData.note) {
        html += `<br><span style="font-size:0.7rem; color:#666;">${sourceData.note}</span>`;
      }
      infoDiv.innerHTML = html;
    }
    infoDiv.style.display = 'block';
    btn.textContent = 'Hide Source';
  } else {
    infoDiv.style.display = 'none';
    btn.textContent = 'Show Source';
  }
}

// ============================================================
// START BUTTON + INITIALIZATION
// ============================================================
function handleStartBtn() {
  const name = $('player-name').value.trim();
  if (!name) {
    $('player-name').style.borderColor = '#F44336';
    $('player-name').focus();
    setTimeout(() => { $('player-name').style.borderColor = '#2a3450'; }, 1500);
    return;
  }

  state.playerName = name;

  // Create or load profile
  if (!profiles[name]) {
    profiles[name] = {
      totalPoints: 0, avatarGender: state.avatarGender || 'boy', avatarPreset: state.avatarPreset || 0,
      accessory: state.selectedAccessory || 'none', theme: state.selectedTheme || 'pilot', lastPlayed: null,
      subjects: {}
    };
  }

  const profile = profiles[name];
  initEmergencyProfile(profile);

  // Save avatar/theme state
  profile.avatarGender = state.avatarGender ?? profile.avatarGender ?? 'boy';
  profile.avatarPreset = state.avatarPreset ?? profile.avatarPreset ?? 0;
  profile.accessory = state.selectedAccessory ?? profile.accessory ?? 'none';
  profile.theme = state.selectedTheme ?? profile.theme ?? 'pilot';

  saveProfiles();
  saveCurrentPlayer(name);

  renderProcedureList();
  renderLeaderboard('home-leaderboard');
}

async function fetchEmergencyData() {
  try {
    const response = await fetch('emergency-data.json');
    emergencyData = await response.json();
  } catch (e) {
    $('procedure-list').innerHTML = '<p style="color:#F44336; text-align:center;">Failed to load emergency procedure data. Please reload.</p>';
  }
}

// ============================================================
// FEEDBACK BAR
// ============================================================
function loadFeedbackLog() {
  try {
    const raw = localStorage.getItem(FEEDBACK_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [];
}

function saveFeedbackLog(log) {
  try { localStorage.setItem(FEEDBACK_KEY, JSON.stringify(log)); } catch (e) {}
}

function getGameSnapshot() {
  return {
    player: state.playerName || 'unknown',
    subject: 'emergency',
    procedure: state.currentProcedure?.id || null,
    score: state.sessionScore,
    streak: state.sessionStreak
  };
}

function submitFeedback() {
  const input = $('fb-input');
  const note = input.value.trim();
  if (!note) return;

  const entry = {
    timestamp: new Date().toISOString(),
    note: note,
    gameState: getGameSnapshot(),
    userAgent: navigator.userAgent
  };

  const log = loadFeedbackLog();
  log.push(entry);
  saveFeedbackLog(log);

  input.value = '';
  input.placeholder = 'Note saved! Enter another...';
  input.style.borderColor = '#4caf50';
  $('fb-status').textContent = `Logged #${log.length}`;
  $('fb-status').style.color = '#4caf50';
  $('fb-count').textContent = `(${log.length} total)`;
  setTimeout(() => {
    input.placeholder = 'Note a bug, suggestion, or confusing question...';
    input.style.borderColor = '#2a3450';
    $('fb-status').textContent = '';
    $('fb-status').style.color = '#888';
  }, 3000);
}

function emailFeedback() {
  const log = loadFeedbackLog();
  if (log.length === 0) { $('fb-status').textContent = 'No notes yet'; return; }
  const body = log.map((entry, i) => {
    const gs = entry.gameState || {};
    return `Note #${i + 1} (${entry.timestamp})\nPlayer: ${gs.player || 'unknown'}\nSubject: ${gs.subject || '?'} | Procedure: ${gs.procedure || 'N/A'}\nNote: ${entry.note}\n`;
  }).join('\n---\n\n');
  const subject = encodeURIComponent('Emergency Quiz Feedback');
  const mailBody = encodeURIComponent(body);
  window.open(`mailto:?subject=${subject}&body=${mailBody}`);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  await fetchEmergencyData();

  // Pre-fill player name
  const savedPlayer = loadCurrentPlayer();
  if (savedPlayer) {
    $('player-name').value = savedPlayer;
    state.playerName = savedPlayer;
    const p = profiles[savedPlayer];
    if (p) {
      state.avatarGender = p.avatarGender ?? 'boy';
      state.avatarPreset = p.avatarPreset ?? 0;
      state.selectedAccessory = p.accessory || 'none';
      state.selectedTheme = p.theme || 'pilot';
      const th = THEMES.find(t => t.id === p.theme);
      if (th) applyTheme(th);
    }
  }

  renderAvatarPicker();
  renderThemePicker();

  // If player already set, render procedure list
  if (state.playerName && profiles[state.playerName]) {
    initEmergencyProfile(profiles[state.playerName]);
    renderProcedureList();
  }

  renderLeaderboard('home-leaderboard');
  $('version-label').textContent = `v${APP_VERSION}`;

  // Event listeners
  $('start-btn').onclick = handleStartBtn;
  $('back-to-menu').onclick = backToMenu;

  $('player-name').addEventListener('input', () => {
    const name = $('player-name').value.trim();
    if (profiles[name]) {
      state.playerName = name;
      const p = profiles[name];
      state.avatarGender = p.avatarGender ?? 'boy';
      state.avatarPreset = p.avatarPreset ?? 0;
      state.selectedAccessory = p.accessory || 'none';
      renderAvatarPicker();
      const th = THEMES.find(t => t.id === p.theme);
      if (th) { state.selectedTheme = th.id; applyTheme(th); }
      renderThemePicker();
    }
  });

  // Avatar controls
  $('avatar-prev').onclick = () => {
    const presets = AVATAR_PRESETS[state.avatarGender || 'boy'];
    state.avatarPreset = ((state.avatarPreset || 0) - 1 + presets.length) % presets.length;
    renderAvatarPicker();
    saveAvatarToProfile();
  };
  $('avatar-next').onclick = () => {
    const presets = AVATAR_PRESETS[state.avatarGender || 'boy'];
    state.avatarPreset = ((state.avatarPreset || 0) + 1) % presets.length;
    renderAvatarPicker();
    saveAvatarToProfile();
  };
  $('avatar-boy').onclick = () => {
    state.avatarGender = 'boy';
    state.avatarPreset = 0;
    renderAvatarPicker();
    saveAvatarToProfile();
  };
  $('avatar-girl').onclick = () => {
    state.avatarGender = 'girl';
    state.avatarPreset = 0;
    renderAvatarPicker();
    saveAvatarToProfile();
  };

  // Feedback bar
  $('fb-count').textContent = `(${loadFeedbackLog().length} notes)`;
  $('fb-submit').onclick = submitFeedback;
  $('fb-email').onclick = emailFeedback;
  $('fb-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitFeedback(); });
});
</script>

</body>
</html>
